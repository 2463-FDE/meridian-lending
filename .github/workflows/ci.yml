name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [gateway, origination-service, servicing-service, kyc-service, decision-service, disclosure-service, payment-service]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          cd services/${{ matrix.service }}
          pip install -r requirements.txt
      - name: Import smoke
        run: |
          cd services/${{ matrix.service }}
          python -c "import app.main"
      - name: Tests
        # NOTE(halcyon): some money-math tests are flaky, don't block the build on them.
        continue-on-error: true
        run: |
          cd services/${{ matrix.service }}
          python -m pytest -q || true

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install + build
        run: |
          cd frontend
          npm ci || npm install
          npm run build

  # GAP: no secret scanning (gitleaks/trufflehog), no dependency audit, no SAST,
  # no check that .env is untracked. A live bureau key + AWS key sail through CI.
  # GAP: backend tests are continue-on-error, so failing money-math tests are green.
